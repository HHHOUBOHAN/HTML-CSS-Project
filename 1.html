<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <link rel="stylesheet" href="CSS/1.css">
    <script src="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.1.0/js/all.min.js"></script>
    <style>
    </style>
</head>
<body>
<nav class="mi-nav">
    <div class="mi-nav-list">
        <div class="mi-logo">
            <a href="https://www.mi.com" class="mi-logo-t">
                <img src="images/logo-mi2.png" alt="小米官网">
            </a>
<!--            如果src图片不显示 就会显示alt-->
        </div>
        <nav class="nav-menu">
            <div class="nav-item">
                <a href="https://www.mi.com">小米官网</a>
            </div>
            <div class="nav-item">
                <a href="https://www.mi.com/store">小米商城</a>
            </div>
            <div class="nav-item">
                <a href="https://www.mi.com/mi-os">小米澎湃OS</a>
            </div>
            <div class="nav-item">
                <a href="https://www.mi.com/car">小米汽车</a>
            </div>
            <div class="nav-item">
                <a href="https://www.mi.com/cloud">云服务</a>
            </div>
            <div class="nav-item">
                <a href="https://www.mi.com/iot">IoT</a>
            </div>
            <div class="nav-item">
                <a href="https://www.mi.com/products">有品</a>
            </div>
            <div class="nav-item">
                <a href="https://www.mi.com/open">小米开放平台</a>
            </div>
            <div class="nav-item">
                <a href="https://www.mi.com/location">Location</a>
            </div>
        </nav>
        <nav class="login-area">
            <div class="menu-item">
                <!-- 登录 -->
                <a href="#" class="hover">登录</a>
                <!-- 分隔线 -->
                <span>|</span>
                <!-- 注册 -->
                <a href="#" class="hover">注册</a>
            </div>
        </nav>

    </div>
</nav>
<div class="content">
<!--    顶部轮播-->
    <div class="section section-banner">

        <div class="swiper banner-swiper">
<!--            划动轨道-->
            <div class="swiper-wrapper">
<!--                一张轮播图-->
                <div class="swiper-slide">
                    <img src="images/1.png" alt="">
                </div>
                <div class="swiper-slide">
                    <img src="images/2.png" alt="">
                </div>
                <div class="swiper-slide">
                    <img src="images/3.png" alt="">
                </div>
                <div class="swiper-slide">
                    <img src="images/4.png" alt="">
                </div>
            </div>
<!--            左箭头-->
            <div class="swiper-button-prev"></div>
<!--            右箭头-->
            <div class="swiper-button-next"></div>
<!--            进度条分页-->
            <div class="swiper-pagination"></div>
        </div>

    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="js.js"></script>
</body>
</html>
